<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eraldo Refrigeração Automotiva</title>
  <link rel="icon" href="assets/logo-transparent.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#05081F">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bgG" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#1E2A6E"/>
          <stop offset="100%" stop-color="#05081F"/>
        </linearGradient>
        <linearGradient id="fG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5EC4F2"/>
          <stop offset="100%" stop-color="#1A9DE0"/>
        </linearGradient>
      </defs>
      <rect width="1200" height="800" fill="url(#bgG)"/>
      <g transform="translate(600 400)" stroke="url(#fG)" stroke-width="18" fill="none" stroke-linecap="round">
        <line x1="0" y1="-180" x2="0" y2="180"/>
        <line x1="-180" y1="0" x2="180" y2="0"/>
        <line x1="-127" y1="-127" x2="127" y2="127"/>
        <line x1="127" y1="-127" x2="-127" y2="127"/>
      </g>
      <text x="600" y="680" text-anchor="middle" font-family="sans-serif" font-size="44" font-weight="700" fill="#EAF0FF" letter-spacing="2">ERALDO REFRIGERAÇÃO</text>
    </svg>
  </template>
  <div id="app"></div>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="landing.jsx"></script>
  <script type="text/babel" src="admin.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "tema": "claro"
    }/*EDITMODE-END*/;

    const App = () => {
      const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);
      const [view, setView] = React.useState('landing'); // landing | login | admin

      // Aplica o tema no body
      React.useEffect(() => {
        document.body.dataset.theme = tweaks.tema === 'escuro' ? 'dark' : 'light';
      }, [tweaks.tema]);

      return (
        <React.Fragment>
          {view === 'landing' && <Landing onAdmin={() => setView('login')}/>}
          {view === 'login' && <Login onLogin={() => setView('admin')} onBack={() => setView('landing')}/>}
          {view === 'admin' && <Admin onLogout={() => setView('landing')}/>}

          <TweaksPanel title="Tweaks" initialPosition="bottom-right">
            <TweakSection title="Tema">
              <TweakRadio
                label="Modo de cor"
                value={tweaks.tema}
                options={[
                  {value: 'claro', label: 'Claro'},
                  {value: 'escuro', label: 'Escuro'},
                ]}
                onChange={(v) => setTweaks({tema: v})}
              />
            </TweakSection>
            <TweakSection title="Navegação rápida">
              <TweakButton label="Ir para Landing" onClick={() => setView('landing')}/>
              <TweakButton label="Ir para Login Admin" onClick={() => setView('login')}/>
              <TweakButton label="Ir direto ao Admin" onClick={() => setView('admin')}/>
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    };

    ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
  </script>
</body>
</html>
